name: Build & Deploy — Bersaglio Jewelry

# ────────────────────────────────────────────────────────────────
#  CONFIGURACIÓN REQUERIDA (una sola vez):
#  1. Ve a tu repo → Settings → Pages
#  2. En "Build and deployment", cambia Source a "GitHub Actions"
#  3. Guarda. El próximo push a main desplegará el sitio.
# ────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  workflow_dispatch:        # permite ejecutar manualmente desde GitHub

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false   # no cancela despliegues en curso

jobs:
  # ── Build ─────────────────────────────────────────────────────
  build:
    name: Build with Vite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist          # Vite output folder

  # ── Deploy ────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
