<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colecciones | Bersaglio Jewelry</title>
    <meta name="description" content="Explora las colecciones de Bersaglio Jewelry: Anillos, Topos & Aretes, Dijes & Colgantes y Argollas. Alta joyería en oro 18K certificada por La Verde / Jewelers of America.">
    <meta name="robots" content="index, follow">

    <!-- Canonical -->
    <link rel="canonical" href="https://bersagliojewelry.co/colecciones.html">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://bersagliojewelry.co/colecciones.html">
    <meta property="og:title" content="Colecciones | Bersaglio Jewelry">
    <meta property="og:description" content="Explora las colecciones de Bersaglio Jewelry: Anillos, Topos & Aretes, Dijes & Colgantes y Argollas. Alta joyería certificada.">
    <meta property="og:site_name" content="Bersaglio Jewelry">
    <meta property="og:locale" content="es_CO">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Colecciones | Bersaglio Jewelry">
    <meta name="twitter:description" content="Anillos, Topos & Aretes, Dijes y Argollas de alta joyería en oro 18K.">

    <!-- Favicon & PWA -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="/favicon-192.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f8faf6">
    <meta name="mobile-web-app-capable" content="yes">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/liquid-glass.css">

</head>
<body>
    <!-- Liquid Glass background -->
    <div class="bj-world" aria-hidden="true"></div>

    <div id="header-placeholder"></div>

    <main>

        <!-- Hero — Catálogo 2026 -->
        <section class="page-hero hero-aqua-page hero-catalog-aqua">
            <div class="container">
                <span class="section-eyebrow">Catálogo · 2026</span>
                <h1 class="page-hero-title hero-aqua-page-title" id="catalog-title">Todas las <em class="emerald-text">piezas</em></h1>
                <p class="page-hero-sub hero-aqua-page-lead" id="catalog-lead">Explora nuestra colección completa. Cada pieza es única, con certificación de origen y oro de ley 750.</p>
            </div>
        </section>

        <!-- Filter pills + sort dropdown -->
        <section class="catalog-controls-section">
            <div class="container">
                <div class="catalog-controls">
                    <!-- Pills (Todo + dynamic from db.getCollections) -->
                    <div class="glass glass-pill catalog-pills" id="catalog-pills" role="tablist" aria-label="Filtrar por colección">
                        <!-- Rendered by js/colecciones.js — first item is "Todo", rest from admin -->
                    </div>

                    <!-- Sort dropdown -->
                    <div class="glass glass-pill catalog-sort">
                        <label for="catalog-sort-select" class="catalog-sort-label">Orden</label>
                        <div class="catalog-sort-select-wrap">
                            <select id="catalog-sort-select" class="catalog-sort-select" aria-label="Ordenar piezas">
                                <option value="featured">Destacados</option>
                                <option value="newest">Más recientes</option>
                                <option value="price-asc">Precio: menor a mayor</option>
                                <option value="price-desc">Precio: mayor a menor</option>
                                <option value="name">Nombre A-Z</option>
                            </select>
                            <svg class="catalog-sort-arrow" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><polyline points="6,9 12,15 18,9"/></svg>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Pieces grid -->
        <section class="section featured catalog-grid-section">
            <div class="container">
                <div id="featured-grid" class="featured-grid">
                    <!-- Rendered by js/colecciones.js -->
                </div>
            </div>
        </section>

        <!-- CTA -->
        <section class="cta-banner cta-v7 hero-aqua-cta-section">
            <div class="container">
                <div class="glass glass-iridescent hero-aqua-cta">
                    <div class="hero-aqua-cta-halo" aria-hidden="true"></div>
                    <div class="hero-aqua-cta-content">
                        <span class="section-eyebrow">Diseño exclusivo</span>
                        <h2 class="hero-aqua-cta-title">¿No encuentras<br><em class="emerald-text">lo que buscas?</em></h2>
                        <p class="hero-aqua-cta-lead">Diseñamos piezas únicas a medida. Cuéntanos tu visión y la hacemos realidad.</p>
                        <div class="hero-aqua-cta-actions">
                            <a href="contacto.html" class="btn-aqua btn-aqua-emerald">Solicitar pieza personalizada</a>
                        </div>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <div id="footer-placeholder"></div>

    <script type="importmap">
    {
        "imports": {
            "gsap":                  "https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.esm.js",
            "gsap/ScrollTrigger":    "https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/ScrollTrigger.esm.js",
            "@studio-freight/lenis": "https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/dist/lenis.mjs"
        }
    }
    </script>

    <script type="module" src="js/colecciones.js"></script>

</body>
</html>
