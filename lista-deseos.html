<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Lista de Deseos — Bersaglio Jewelry</title>

    <!-- SEO -->
    <meta name="description" content="Tu lista de piezas favoritas de Bersaglio Jewelry. Comparte tus preferencias y solicita información directamente por WhatsApp.">
    <meta name="robots" content="noindex, nofollow">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="img/logo-bj2.png">
    <link rel="apple-touch-icon" href="img/logo-bj2.png">

    <!-- Theme -->
    <meta name="theme-color" content="#0B3D2E">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Page script -->
    <script type="module" src="js/wishlist-page.js"></script>
</head>
<body>

    <!-- Header -->
    <div id="header-placeholder"></div>

    <main>

        <!-- Page hero -->
        <section class="page-hero">
            <div class="container">
                <div class="page-hero-inner">
                    <span class="page-hero-label">Tu selección</span>
                    <h1 class="page-hero-title">Lista de Deseos</h1>
                    <p class="page-hero-sub">Las piezas que han capturado tu corazón</p>
                </div>
            </div>
        </section>

        <!-- Actions bar (visible only when items exist) -->
        <div id="wishlist-actions" class="wishlist-actions container" hidden>
            <span id="wishlist-item-count" class="wishlist-item-count"></span>
            <div class="wishlist-action-btns">
                <button id="share-wa" class="btn-wa-share">
                    <svg viewBox="0 0 32 32" width="18" height="18" aria-hidden="true">
                        <path fill="currentColor" d="M16 0C7.163 0 0 7.163 0 16c0 2.825.739 5.488 2.037 7.813L.112 31.488l8.013-2.038C10.413 30.725 13.113 32 16 32c8.837 0 16-7.163 16-16S24.837 0 16 0zm0 29.388c-2.475 0-4.8-.675-6.787-1.85l-.488-.288-5.05 1.288 1.338-4.863-.313-.512C3.338 21.088 2.612 18.6 2.612 16 2.612 8.6 8.6 2.612 16 2.612S29.388 8.6 29.388 16 23.4 29.388 16 29.388zm7.35-10.037c-.4-.2-2.363-1.175-2.725-1.3-.363-.125-.625-.2-.888.2-.262.4-1.012 1.3-1.237 1.563-.225.262-.45.3-.85.1-.4-.2-1.688-.625-3.213-2-.188-1.075-1.338-1.8-1.738-2-.4-.2-.038-.3.175-.4.175-.175.4-.45.6-.675.2-.225.263-.375.4-.625.138-.25.063-.475-.025-.675-.088-.2-.888-2.138-1.213-2.925-.325-.788-.65-.675-.888-.688-.225-.012-.475-.012-.725-.012s-.663.088-1.013.438c-.35.35-1.338 1.313-1.338 3.2s1.375 3.713 1.563 3.975c.188.263 2.638 4.025 6.4 5.638.888.388 1.588.625 2.125.8.9.275 1.713.238 2.363.15.725-.113 2.238-.925 2.55-1.8.313-.875.313-1.625.225-1.8-.088-.175-.338-.275-.738-.475z"/>
                    </svg>
                    Compartir por WhatsApp
                </button>
                <button id="clear-wishlist" class="btn-clear-wishlist">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="15" height="15" aria-hidden="true">
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M19 6l-1 14H6L5 6"/>
                        <path d="M10 11v6M14 11v6"/>
                        <path d="M9 6V4h6v2"/>
                    </svg>
                    Vaciar lista
                </button>
            </div>
        </div>

        <!-- Content area -->
        <section class="wishlist-section section">
            <div class="container">

                <!-- Empty state -->
                <div id="wishlist-empty" class="wishlist-empty" hidden>
                    <div class="wishlist-empty-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" width="64" height="64">
                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                        </svg>
                    </div>
                    <h2 class="wishlist-empty-title">Tu lista está vacía</h2>
                    <p class="wishlist-empty-desc">
                        Guarda las piezas que te inspiran y vuelve a encontrarlas aquí.<br>
                        Cuando estés listo, compártelas con nosotros por WhatsApp.
                    </p>
                    <a href="colecciones.html" class="btn-explore">
                        Explorar colecciones
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15" aria-hidden="true">
                            <path d="M5 12h14M12 5l7 7-7 7"/>
                        </svg>
                    </a>
                </div>

                <!-- Pieces grid -->
                <div id="wishlist-grid" class="pieces-grid"></div>

            </div>
        </section>

    </main>

    <!-- Footer -->
    <div id="footer-placeholder"></div>

</body>
</html>
