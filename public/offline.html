<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sin conexión | Bersaglio Jewelry</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --gold:    #C9A84C;
            --dark:    #0a0a0a;
            --surface: #111111;
            --border:  rgba(255,255,255,0.08);
            --text:    #F0EBE0;
            --muted:   rgba(240,235,224,0.45);
        }

        html, body {
            height: 100%;
            background: var(--dark);
            color: var(--text);
            font-family: 'Georgia', 'Times New Roman', serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100dvh;
            padding: 40px 24px;
            text-align: center;
        }

        /* Animated gem */
        .gem {
            margin-bottom: 40px;
            color: rgba(201, 168, 76, 0.25);
            animation: gem-pulse 3s ease-in-out infinite;
        }
        @keyframes gem-pulse {
            0%, 100% { opacity: 0.25; transform: scale(1); }
            50%       { opacity: 0.7;  transform: scale(1.06); }
        }
        .gem svg { filter: drop-shadow(0 0 12px rgba(201,168,76,0.3)); }

        /* Gold ornament line */
        .ornament {
            width: 40px;
            height: 1px;
            background: var(--gold);
            margin: 0 auto 28px;
            opacity: 0.5;
        }

        .eyebrow {
            font-family: 'Arial Narrow', Arial, sans-serif;
            font-size: 10px;
            font-weight: 400;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 16px;
            opacity: 0.9;
        }

        h1 {
            font-size: clamp(2rem, 6vw, 3.2rem);
            font-weight: 300;
            line-height: 1.15;
            letter-spacing: -0.01em;
            color: var(--text);
            margin-bottom: 18px;
        }
        h1 em { font-style: italic; color: var(--gold); }

        p {
            font-size: 15px;
            font-weight: 400;
            color: var(--muted);
            line-height: 1.7;
            max-width: 380px;
            margin: 0 auto 36px;
        }

        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 13px 28px;
            font-family: 'Arial Narrow', Arial, sans-serif;
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            text-decoration: none;
            border-radius: 2px;
            transition: all 0.25s ease;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--gold);
            color: #0a0a0a;
            border: 1px solid var(--gold);
        }
        .btn-primary:hover { background: #d9b95c; }

        .btn-outline {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-outline:hover { border-color: var(--gold); color: var(--gold); }

        .footer-note {
            margin-top: 60px;
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 0.06em;
            opacity: 0.6;
        }

        /* Status indicator */
        .status-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #d94f4f;
            margin-right: 6px;
            animation: blink 1.5s ease-in-out infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <div class="gem" aria-hidden="true">
        <svg viewBox="0 0 80 80" fill="none" stroke="currentColor" stroke-width="0.8" width="80" height="80">
            <polygon points="40,6 72,24 72,56 40,74 8,56 8,24"/>
            <line x1="8"  y1="24" x2="72" y2="24"/>
            <line x1="8"  y1="56" x2="72" y2="56"/>
            <line x1="24" y1="6"  x2="8"  y2="24"/>
            <line x1="56" y1="6"  x2="72" y2="24"/>
            <line x1="40" y1="6"  x2="40" y2="74"/>
        </svg>
    </div>

    <p class="eyebrow">
        <span class="status-dot" aria-hidden="true"></span>
        Sin conexión
    </p>

    <div class="ornament" aria-hidden="true"></div>

    <h1>Estás <em>offline</em></h1>

    <p>
        No hay conexión a internet en este momento. Puedes recargar la página
        cuando recuperes la señal para seguir explorando nuestras colecciones.
    </p>

    <div class="actions">
        <a href="javascript:window.location.reload()" class="btn-primary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="13" height="13" aria-hidden="true">
                <polyline points="1,4 1,10 7,10"/><path d="M3.51 15a9 9 0 1 0 .49-4.14"/>
            </svg>
            Reintentar
        </a>
        <a href="/" class="btn-outline">Inicio</a>
    </div>

    <p class="footer-note">BERSAGLIO JEWELRY · Alta Joyería</p>

</body>
</html>
